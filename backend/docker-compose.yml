services:
  onboarding-kof-api:
    build: .
    container_name: onboarding-kof-api
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./credentials:/app/credentials:ro
    networks:
      - traefik
      - entersys-backend
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.onboarding-kof-api.rule=Host(`api.entersys.mx`) && (PathPrefix(`/api/v1/onboarding`) || PathPrefix(`/api/v1/smartsheet-webhook`))"
      - "traefik.http.routers.onboarding-kof-api.priority=110"
      - "traefik.http.routers.onboarding-kof-api.entrypoints=websecure"
      - "traefik.http.routers.onboarding-kof-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.onboarding-kof-api.loadbalancer.server.port=8000"

networks:
  traefik:
    external: true
  entersys-backend:
    name: content-management_entersys_net
    external: true
