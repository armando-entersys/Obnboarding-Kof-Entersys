services:
  onboarding-kof-api:
    build: .
    container_name: onboarding-kof-api
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./credentials:/app/credentials:ro
    networks:
      - traefik-public
      - entersys-backend
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.onboarding-kof-api.rule=Host(`api.entersys.mx`) && PathPrefix(`/api/v1/onboarding`)"
      - "traefik.http.routers.onboarding-kof-api.priority=110"
      - "traefik.http.routers.onboarding-kof-api.entrypoints=websecure"
      - "traefik.http.routers.onboarding-kof-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.onboarding-kof-api.loadbalancer.server.port=8000"

networks:
  traefik-public:
    external: true
  entersys-backend:
    # This is the internal network where PostgreSQL runs.
    # The actual network name in production must match the backend's docker-compose.
    # Use `docker network ls | grep entersys` on the server to find the exact name.
    # Then set it here. Common names: entersys_net, content-management_entersys_net
    external: true
