server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA Routing — all onboarding routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;

        # Content Security Policy (minimal for onboarding)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.entersys.mx https://cdn.entersys.mx https://storage.googleapis.com; media-src 'self' https://cdn.entersys.mx https://storage.googleapis.com; object-src 'none'; base-uri 'self'; form-action 'self';" always;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(self), payment=(), usb=()" always;
    }

    # Rewrite /onboarding-assets/ to root for Vite base path
    rewrite ^/onboarding-assets/(.*)$ /$1 last;

    # Cache static assets
    location ~* \.(js|css|woff|woff2|ttf|eot|ico|webp|jpg|jpeg|png|gif|svg)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Video files
    location ~* \.(mp4|webm|ogg)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header Accept-Ranges bytes;
        access_log off;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/xml image/svg+xml;
}
